name: Prompt Change Detection

on:
  pull_request:
    paths:
      - 'prompts/**'

permissions:
  pull-requests: write

jobs:
  notify-prompt-changes:
    name: Notify Prompt Changes
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Prompt changes detected!**\n\nModifications to the `prompts/` directory have been made. A full regression test run is highly recommended before merging this pull request to ensure evaluation quality has not degraded.'
            })
