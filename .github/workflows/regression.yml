
name: Regression Test Run

on:
  schedule:
    # Run every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset to evaluate'
        required: false
        default: 'all'

jobs:
  evaluate:
    name: Run MRDS Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run Evaluation
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.inputs.dataset }}" != "" ] && [ "${{ github.event.inputs.dataset }}" != "all" ]; then
            mrds evaluate --dataset ${{ github.event.inputs.dataset }}
          else
            mrds evaluate
          fi
